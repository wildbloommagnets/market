<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no"
    />

    <title>Photo Upload</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet"
    >

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #111111;
            --card: #1a1a1a;
            --btn: #f5c518;
            --btn-text: #111111;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.55);

            --radius: 20px;
            --radius-lg: 32px;
        }

        body {

            font-family: 'DM Sans', sans-serif;

            background: var(--bg);

            min-height: 100dvh;

            display: flex;

            align-items: center;

            justify-content: center;

            padding: 20px;

            overflow-x: hidden;

            transition: background 0.4s ease;
        }

        body::before {

            content: '';

            position: fixed;

            inset: 0;

            background-image:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");

            pointer-events: none;

            opacity: 0.6;
        }

        .card {

            position: relative;

            z-index: 1;

            width: 100%;

            max-width: 440px;

            background: var(--card);

            border-radius: var(--radius-lg);

            padding: 38px 28px;

            border: 1px solid rgba(255,255,255,0.08);

            box-shadow: 0 40px 80px rgba(0,0,0,0.5);

            animation: cardIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {

            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-wrap {

            width: 96px;

            height: 96px;

            border-radius: 50%;

            overflow: hidden;

            margin: 0 auto 20px;

            display: none;

            align-items: center;

            justify-content: center;

            border: 2px solid rgba(255,255,255,0.1);
        }

        .logo-wrap.visible {
            display: flex;
        }

        .logo-wrap img {

            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .event-name {

            font-family: 'Unbounded', sans-serif;

            font-size: clamp(1.3rem, 5vw, 1.7rem);

            line-height: 1.15;

            font-weight: 900;

            color: var(--text);

            text-align: center;

            margin-bottom: 10px;
        }

        .event-tagline {

            color: var(--text-muted);

            text-align: center;

            font-size: 0.92rem;

            margin-bottom: 28px;
        }

        .input {

            width: 100%;

            padding: 16px 18px;

            border-radius: var(--radius);

            border: 2px solid rgba(255,255,255,0.12);

            background: rgba(255,255,255,0.04);

            color: var(--text);

            font-size: 1rem;

            outline: none;

            margin-bottom: 14px;

            transition: border-color 0.2s ease;
        }

        .input:focus {
            border-color: var(--btn);
        }

        .input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .picker-row {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 12px;

            margin-bottom: 16px;
        }

        .picker-btn {

            position: relative;

            border-radius: var(--radius);

            border: 2px dashed rgba(255,255,255,0.15);

            padding: 28px 12px 22px;

            background: rgba(255,255,255,0.03);

            text-align: center;

            overflow: hidden;

            cursor: pointer;

            transition: all 0.2s ease;
        }

        .picker-btn:hover {

            border-color: var(--btn);

            transform: translateY(-2px);
        }

        .picker-btn input {

            position: absolute;

            inset: 0;

            width: 100%;

            height: 100%;

            opacity: 0;

            cursor: pointer;
        }

        .picker-icon {

            font-size: 2rem;

            display: block;

            margin-bottom: 8px;
        }

        .picker-label {

            font-family: 'Unbounded', sans-serif;

            font-size: 0.7rem;

            text-transform: uppercase;

            line-height: 1.4;

            color: var(--text);
        }

        .preview-strip {

            display: flex;

            gap: 8px;

            overflow-x: auto;

            margin-bottom: 18px;

            padding-bottom: 4px;

            scrollbar-width: none;
        }

        .preview-strip::-webkit-scrollbar {
            display: none;
        }

        .preview-thumb {

            width: 72px;

            height: 72px;

            border-radius: 12px;

            object-fit: cover;

            flex-shrink: 0;

            border: 2px solid rgba(255,255,255,0.1);
        }

        .preview-count {

            width: 72px;

            height: 72px;

            border-radius: 12px;

            flex-shrink: 0;

            display: flex;

            align-items: center;

            justify-content: center;

            background: rgba(255,255,255,0.05);

            color: var(--text-muted);

            font-weight: 700;
        }

        .send-btn {

            width: 100%;

            border: none;

            border-radius: var(--radius);

            padding: 18px;

            background: var(--btn);

            color: var(--btn-text);

            font-family: 'Unbounded', sans-serif;

            font-weight: 900;

            font-size: 0.85rem;

            text-transform: uppercase;

            cursor: pointer;

            transition: all 0.2s ease;

            display: none;

            align-items: center;

            justify-content: center;

            gap: 10px;
        }

        .send-btn.visible {
            display: flex;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {

            width: 18px;

            height: 18px;

            border-radius: 50%;

            border: 2px solid rgba(0,0,0,0.2);

            border-top-color: var(--btn-text);

            animation: spin 0.7s linear infinite;

            display: none;
        }

        .spinner.visible {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status {

            display: none;

            margin-top: 16px;

            padding: 14px 16px;

            border-radius: var(--radius);

            text-align: center;

            font-size: 0.9rem;

            line-height: 1.5;
        }

        .status.visible {
            display: block;
        }

        .status.success {

            background: rgba(34,197,94,0.15);

            color: #4ade80;
        }

        .status.error {

            background: rgba(239,68,68,0.15);

            color: #f87171;
        }

        .status.sending {

            background: rgba(255,255,255,0.05);

            color: var(--text-muted);
        }

    </style>
</head>

<body>

<div class="card">

    <div class="logo-wrap" id="logo-wrap">
        <img id="event-logo" src="" alt="Event Logo">
    </div>

    <h1 class="event-name" id="event-name">
        Loading...
    </h1>

    <p class="event-tagline" id="event-tagline">
        Connecting to event...
    </p>

    <input
        type="text"
        id="last-name"
        class="input"
        placeholder="Your Last Name"
        autocomplete="family-name"
    >

    <input
        type="tel"
        id="phone"
        class="input"
        placeholder="Your Phone Number"
        autocomplete="tel"
        inputmode="tel"
    >

    <div class="picker-row">

        <div class="picker-btn">

            <input
                type="file"
                id="camera-input"
                accept="image/*"
                capture="environment"
                multiple
            >

            <span class="picker-icon">📷</span>

            <span class="picker-label">
                Take Photo
            </span>

        </div>

        <div class="picker-btn">

            <input
                type="file"
                id="library-input"
                accept="image/*"
                multiple
            >

            <span class="picker-icon">🖼️</span>

            <span class="picker-label">
                Choose Photos
            </span>

        </div>

    </div>

    <div class="preview-strip" id="preview-strip"></div>

    <button class="send-btn" id="send-btn">

        <span id="btn-label">
            Upload Photos
        </span>

        <div class="spinner" id="spinner"></div>

    </button>

    <div class="status" id="status"></div>

</div>

<script>

    // ─────────────────────────────────────────
    // CONFIG
    // ─────────────────────────────────────────

    const SCRIPT_URL =
        'https://script.google.com/macros/s/AKfycbyYDOvaLlXwyYif54_NenHinFz3sAoxUPWGTemFDRQ0Lzh9PUU-9_QfrnXPTxLL_3qKvQ/exec';

    // ─────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────

    const urlParams =
        new URLSearchParams(window.location.search);

    const eventKey =
        urlParams.get('event') || 'default';

    const sessionId =
        Date.now().toString(36) +
        Math.random().toString(36).slice(2, 6);

    let selectedFiles = [];

    // ─────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────

    function setStatus(message, type) {

        const status =
            document.getElementById('status');

        status.textContent = message;

        status.className =
            'status visible ' + type;
    }

    function getTextColor(hex) {

        hex = hex.replace('#', '');

        const r = parseInt(hex.substr(0,2),16);
        const g = parseInt(hex.substr(2,2),16);
        const b = parseInt(hex.substr(4,2),16);

        return (
            (r * 299 + g * 587 + b * 114) / 1000
        ) > 128
            ? '#111111'
            : '#ffffff';
    }

    function getLightTint(hex) {

        hex = hex.replace('#', '');

        const r = parseInt(hex.substr(0,2),16);
        const g = parseInt(hex.substr(2,2),16);
        const b = parseInt(hex.substr(4,2),16);

        return `
            rgb(
                ${Math.round(r + (255-r)*0.85)},
                ${Math.round(g + (255-g)*0.85)},
                ${Math.round(b + (255-b)*0.85)}
            )
        `;
    }

    // ─────────────────────────────────────────
    // LOAD EVENT THEME
    // ─────────────────────────────────────────

    async function loadTheme() {

        try {

            const response = await fetch(
                SCRIPT_URL +
                '?event=' +
                encodeURIComponent(eventKey)
            );

            const theme =
                await response.json();

            if (!theme.success) {
                throw new Error('Event not found');
            }

            document.title =
                theme.name || 'Photo Upload';

            document.getElementById('event-name')
                .textContent =
                theme.name || 'Photo Upload';

            document.getElementById('event-tagline')
                .textContent =
                theme.tagline || 'Upload photos';

            if (theme.logo) {

                document.getElementById('event-logo')
                    .src = theme.logo;

                document.getElementById('logo-wrap')
                    .classList.add('visible');
            }

            const bg =
                theme.bgColor || '#111111';

            const btn =
                theme.btnColor || '#f5c518';

            document.body.style.background =
                bg;

            document.querySelector('.card')
                .style.background =
                getLightTint(bg);

            document.documentElement
                .style.setProperty('--btn', btn);

            document.documentElement
                .style.setProperty(
                    '--btn-text',
                    getTextColor(btn)
                );

        } catch (err) {

            console.error(err);

            setStatus(
                'Could not load event.',
                'error'
            );
        }
    }

    loadTheme();

    // ─────────────────────────────────────────
    // FILE PICKERS
    // ─────────────────────────────────────────

    function handleFiles(fileList) {

        const files =
            Array.from(fileList);

        if (!files.length) return;

        files.forEach(file => {

            const exists =
                selectedFiles.some(
                    f =>
                        f.name === file.name &&
                        f.size === file.size
                );

            if (!exists) {
                selectedFiles.push(file);
            }
        });

        renderPreviews();

        document.getElementById('send-btn')
            .classList.add('visible');

        document.getElementById('btn-label')
            .textContent =
            `Upload ${selectedFiles.length} Photo${selectedFiles.length !== 1 ? 's' : ''}`;
    }

    document
        .getElementById('camera-input')
        .addEventListener(
            'change',
            e => handleFiles(e.target.files)
        );

    document
        .getElementById('library-input')
        .addEventListener(
            'change',
            e => handleFiles(e.target.files)
        );

    function renderPreviews() {

        const strip =
            document.getElementById('preview-strip');

        strip.innerHTML = '';

        const MAX = 5;

        selectedFiles
            .slice(0, MAX)
            .forEach(file => {

                const url =
                    URL.createObjectURL(file);

                const img =
                    document.createElement('img');

                img.src = url;

                img.className =
                    'preview-thumb';

                strip.appendChild(img);
            });

        if (selectedFiles.length > MAX) {

            const extra =
                document.createElement('div');

            extra.className =
                'preview-count';

            extra.textContent =
                '+' + (selectedFiles.length - MAX);

            strip.appendChild(extra);
        }
    }

    // ─────────────────────────────────────────
    // UPLOAD
    // ─────────────────────────────────────────

    document
        .getElementById('send-btn')
        .addEventListener(
            'click',
            async function () {

                if (!selectedFiles.length) {
                    return;
                }

                const lastName =
                    document
                        .getElementById('last-name')
                        .value
                        .trim();

                const phone =
                    document
                        .getElementById('phone')
                        .value
                        .trim();

                if (!lastName) {

                    setStatus(
                        'Please enter your last name.',
                        'error'
                    );

                    return;
                }

                if (!phone) {

                    setStatus(
                        'Please enter your phone number.',
                        'error'
                    );

                    return;
                }

                const sendBtn = this;

                sendBtn.disabled = true;

                document
                    .getElementById('spinner')
                    .classList.add('visible');

                document
                    .getElementById('btn-label')
                    .textContent =
                    'Uploading...';

                setStatus(
                    'Uploading photos...',
                    'sending'
                );

                try {

                    const files =
                        await Promise.all(

                            selectedFiles.map(file => {

                                return new Promise(resolve => {

                                    const reader =
                                        new FileReader();

                                    reader.onload = () => {

                                        resolve({
                                            name: file.name,
                                            base64: reader.result
                                        });
                                    };

                                    reader.readAsDataURL(file);
                                });
                            })
                        );

                    const response =
                        await fetch(SCRIPT_URL, {

                            method: 'POST',

                            headers: {
                                'Content-Type': 'text/plain'
                            },

                            body: JSON.stringify({

                                eventId: eventKey,

                                sessionId: sessionId,

                                lastName: lastName,

                                phone: phone,

                                files: files
                            })
                        });

                    const result =
                        await response.json();

                    if (!result.success) {
                        throw new Error(result.message);
                    }

                    setStatus(
                        `✅ ${result.uploaded} photo(s) uploaded successfully.`,
                        'success'
                    );

                    document
                        .getElementById('btn-label')
                        .textContent =
                        '✓ Uploaded';

                    selectedFiles = [];

                    document
                        .getElementById('preview-strip')
                        .innerHTML = '';

                } catch (err) {

                    console.error(err);

                    setStatus(
                        'Upload failed. Please try again.',
                        'error'
                    );

                    document
                        .getElementById('btn-label')
                        .textContent =
                        'Retry Upload';
                }

                sendBtn.disabled = false;

                document
                    .getElementById('spinner')
                    .classList.remove('visible');
            }
        );

</script>

</body>
</html>
